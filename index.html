<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Web Của Tôi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #2d3436; }
        p { color: #636e72; line-height: 1.6; }
        .btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #74b9ff; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Chào thế giới! 👋</h1>
        <p>Đây là trang web đầu tiên của tôi được host trên <strong>GitHub Pages</strong>.</p>
        <p>Tôi đang làm quen với lập trình web và mọi thứ trông thật thú vị!</p>
        <a href="https://github.com" class="btn">Ghé thăm GitHub của tôi</a>
    </div>

</body>
</html>
